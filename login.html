<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - V3 Group of Business</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#007AFF,#00C6FF);
}

.card{
width:400px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
text-align:center;
}

h1{
color:#007AFF;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#007AFF;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0056d6;
}

p{
margin-top:20px;
font-size:14px;
color:#666;
}
</style>

</head>

<body>

<div class="card">

<h1>V3 GROUP OF BUSINESS</h1>

<h2>Login</h2>

<input type="text" placeholder="Enter Your Name">

<input type="tel" placeholder="Mobile Number">

<button onclick="location.href='challenge.html'">

Continue

</button>

<p>One Mobile Number = One Attempt Per Day</p>

</div>

</body>
</html>
