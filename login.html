<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - V3 Group of Business</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#007AFF,#00C6FF);
}

.card{
width:400px;
max-width:95%;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
text-align:center;
}

h1{
color:#007AFF;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
outline:none;
}

input:focus{
border-color:#007AFF;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#007AFF;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0056d6;
}

#recaptcha-container{
margin-top:15px;
}

p{
margin-top:20px;
font-size:14px;
color:#666;
}
</style>

</head>

<body>

<div class="card">

<h1>V3 GROUP OF BUSINESS</h1>

<h2>Free Biryani Challenge</h2>

<input
type="text"
id="name"
placeholder="Enter Your Name"
required>

<input
type="tel"
id="phone"
placeholder="Enter Mobile Number"
maxlength="10"
required>

<div id="recaptcha-container"></div>

<button onclick="continueGame()">
Continue
</button>

<p>One Mobile Number = One Attempt Per Day</p>

</div>

<script>
function continueGame(){

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();

if(name==""){
alert("Please Enter Your Name");
return;
}

if(phone.length!=10){
alert("Enter Valid Mobile Number");
return;
}

localStorage.setItem("playerName",name);
localStorage.setItem("playerPhone",phone);

window.location.href="challenge.html";

}
</script>

</body>
</html>
